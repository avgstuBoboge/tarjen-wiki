site_name: 比赛记录 Wiki
site_description: 编程比赛记录与题解
site_author: avgstuBoboge

repo_name: avgstuBoboge/tarjen-wiki
repo_url: https://github.com/avgstuBoboge/tarjen-wiki
edit_uri: edit/main/docs/

docs_dir: docs

nav:
  - 比赛记录: index.md
  - Contests:
      # SYNC:CONTEST-NAV-START
      - "第八届中国大学生程序设计竞赛 绵阳站（CCPC 2022 Mianyang Site）": contests/2026-ccpc-2022-mianyang-site.md
      - "The 2019 Polish Collegiate Programming Contest (AMPPZ 2019)": contests/2026-the-2019-polish-collegiate-programming-contest-amppz-2019.md
      - "2026 年山东省大学生程序设计竞赛": contests/2026-shandong-provincial-collegiate-programming-contest.md
      # SYNC:CONTEST-NAV-END

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.magiclink
  - pymdownx.snippets

plugins:
  - search:
      lang: zh

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/avgstuBoboge
  generator: false

extra_css:
  - assets/stylesheets/extra.css
