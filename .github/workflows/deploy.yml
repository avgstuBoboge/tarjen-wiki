name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只跑一个 deploy：连按 3 次 main push 不会 3 个 workflow 抢 gh-pages 分支
# 旧的 cancel，新 push 跑完整流程
concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # mkdocs gh-deploy 网络抽风最多挂几小时；超时 10 分钟让 CI 报警
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Sync CSV → docs/index.md
        run: python3 tools/sync.py
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build & deploy to gh-pages
        run: mkdocs gh-deploy --force --clean
